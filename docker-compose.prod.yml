version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        - NODE_ENV=production
    image: autoads:latest
    container_name: autoads-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - NEXT_TELEMETRY_DISABLED=1
      - REDIS_URL=${REDIS_URL}
      - QUEUE_SPLIT_BACKGROUND=true
      - LOG_LEVEL=warn
      - QUEUE_VERBOSE_LOG=false
      - OPENCLAW_CONSOLE_LEVEL=warn
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '3'
    volumes:
      - ./scripts:/app/scripts:ro
    healthcheck:
      test:
        ['CMD', 'curl', '-fsS', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - autoads-network
networks:
  autoads-network:
    driver: bridge
