[supervisord]
nodaemon=true
logfile=/app/logs/supervisord.log
logfile_maxbytes=50MB
logfile_backups=10
loglevel=info
pidfile=/app/tmp/supervisord.pid
user=nextjs

[unix_http_server]
file=/app/tmp/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///app/tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:autoads-web]
command=node server.js
directory=/app
autostart=true
autorestart=true
startretries=3
stderr_logfile=/app/logs/web-error.log
stdout_logfile=/app/logs/web-output.log
stderr_logfile_maxbytes=10MB
stdout_logfile_maxbytes=10MB
environment=NODE_ENV="production",HOME="/app",OPENCLAW_STATE_DIR="/app/.openclaw",OPENCLAW_WORKSPACE_DIR="/app/.openclaw/workspace",PORT="3000",HOSTNAME="0.0.0.0",REDIS_URL="%(ENV_REDIS_URL)s",QUEUE_SPLIT_BACKGROUND="true",QUEUE_BACKGROUND_WORKER="false",NODE_OPTIONS="--max-old-space-size=%(ENV_NODE_MAX_OLD_SPACE_SIZE_WEB)s"
stopwaitsecs=30
stopsignal=SIGTERM

[program:autoads-scheduler]
command=tsx /app/src/scheduler.ts
directory=/app
autostart=true
autorestart=true
startretries=3
stderr_logfile=/app/logs/scheduler-error.log
stdout_logfile=/app/logs/scheduler-output.log
stderr_logfile_maxbytes=10MB
stdout_logfile_maxbytes=10MB
environment=NODE_ENV="production",HOME="/app",OPENCLAW_STATE_DIR="/app/.openclaw",OPENCLAW_WORKSPACE_DIR="/app/.openclaw/workspace",RUN_SYNC_ON_START="false",REDIS_URL="%(ENV_REDIS_URL)s",QUEUE_SPLIT_BACKGROUND="true",QUEUE_BACKGROUND_WORKER="false",NODE_OPTIONS="--max-old-space-size=%(ENV_NODE_MAX_OLD_SPACE_SIZE_SCHEDULER)s"
stopwaitsecs=60
stopsignal=SIGTERM

[program:autoads-background-worker]
command=node dist/background-worker.js
directory=/app
autostart=true
autorestart=true
startretries=3
stderr_logfile=/app/logs/background-worker-error.log
stdout_logfile=/app/logs/background-worker-output.log
stderr_logfile_maxbytes=10MB
stdout_logfile_maxbytes=10MB
environment=NODE_ENV="production",HOME="/app",OPENCLAW_STATE_DIR="/app/.openclaw",OPENCLAW_WORKSPACE_DIR="/app/.openclaw/workspace",REDIS_URL="%(ENV_REDIS_URL)s",QUEUE_BACKGROUND_WORKER="true",QUEUE_SPLIT_BACKGROUND="true",NODE_OPTIONS="--max-old-space-size=%(ENV_NODE_MAX_OLD_SPACE_SIZE_BACKGROUND_WORKER)s"
stopwaitsecs=60
stopsignal=SIGTERM

[program:openclaw-gateway]
command=/usr/local/bin/node22 /app/openclaw/openclaw.mjs gateway
directory=/app/openclaw
autostart=true
autorestart=true
startretries=3
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
environment=NODE_ENV="production",HOME="/app",DATABASE_URL="",DATABASE_PATH=":memory:",OPENCLAW_CONFIG_PATH="/app/.openclaw/openclaw.json",OPENCLAW_STATE_DIR="/app/.openclaw",OPENCLAW_WORKSPACE_DIR="/app/.openclaw/workspace",OPENCLAW_BUNDLED_SKILLS_DIR="/app/openclaw/skills",OPENCLAW_LOG_FILE="/proc/self/fd/1",OPENCLAW_CONSOLE_LEVEL="info",OPENCLAW_CONSOLE_STYLE="compact",NODE_OPTIONS="--max-old-space-size=%(ENV_NODE_MAX_OLD_SPACE_SIZE_OPENCLAW)s"
stopwaitsecs=60
stopsignal=SIGTERM

[group:autoads]
programs=autoads-web,autoads-scheduler,autoads-background-worker,openclaw-gateway
priority=999
