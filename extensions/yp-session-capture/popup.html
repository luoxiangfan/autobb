<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YP 登录态回传</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #0f172a;
      background: #f8fafc;
    }

    .panel {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      background: #fff;
      padding: 12px;
    }

    .title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .hint {
      font-size: 12px;
      color: #475569;
      line-height: 1.5;
      margin: 0 0 10px;
    }

    .btn {
      width: 100%;
      height: 36px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn[disabled] {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .status {
      margin-top: 10px;
      min-height: 18px;
      font-size: 12px;
      line-height: 1.45;
      color: #334155;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .status.error {
      color: #b91c1c;
    }

    .status.success {
      color: #166534;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="title">YP 登录态回传</div>
    <p class="hint">
      请先保持 AutoAds 的 <code>/products</code> 页面处于已登录状态，再点击下方按钮。
    </p>
    <button id="captureBtn" class="btn" type="button">回传 YeahPromos 登录态</button>
    <div id="status" class="status"></div>
  </div>
  <script src="./popup.js"></script>
</body>
</html>
